# VCMS-nginx.conf — live (certbot + security headers hardening, 2026-05-11)
# Certbot manages the ssl/redirect sections (marked "managed by Certbot").
# IP-direct block (server 3) is custom — certbot does not touch it.
#
# Security headers use `always` flag so they appear on 4xx/5xx too (incl. Basic Auth 401).

# ── [1] HTTPS: cmd.flexgrafik.nl ─────────────────────────────────────────────
server {
    server_name cmd.flexgrafik.nl;

    # Security headers — applied before proxy_pass (covers 401, 403, 5xx from nginx itself)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=()" always;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        auth_basic off;
    }

    location / {
        auth_basic "VCMS Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cmd.flexgrafik.nl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cmd.flexgrafik.nl/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ── [2] HTTP → HTTPS redirect (certbot managed) ───────────────────────────────
server {
    if ($host = cmd.flexgrafik.nl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name cmd.flexgrafik.nl;
    return 404; # managed by Certbot
}

# ── [3] HTTP fallback: IP direct ─────────────────────────────────────────────
# Maintains access via http://185.243.54.115/ for compatibility.
# No HSTS here (HTTP-only block — HSTS on HTTPS only, per spec).
server {
    listen 80;
    server_name 185.243.54.115 _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        auth_basic off;
    }

    location / {
        auth_basic "VCMS Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
