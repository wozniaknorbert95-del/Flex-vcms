# VCMS-nginx.conf — pre-DNS/pre-TLS (2026-05-08)
# Po dodaniu DNS A record uruchom na VPS:
#   certbot --nginx -d cmd.flexgrafik.nl --register-unsafely-without-email
# Certbot automatycznie doda blok HTTPS + redirect HTTP->HTTPS.

server {
    server_name cmd.flexgrafik.nl 185.243.54.115 _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        auth_basic off;
    }

    location / {
        auth_basic "VCMS Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cmd.flexgrafik.nl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cmd.flexgrafik.nl/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = cmd.flexgrafik.nl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen 8010;
    server_name cmd.flexgrafik.nl 185.243.54.115 _;
    return 404; # managed by Certbot


}