# VCMS-nginx.conf — reference config (wklej na VPS, nie trasuj przez VitePress)
# Zaktualizowany: 2026-05-08 — dodany blok HTTPS + redirect + komentarze TLS
#
# KROK 1: Ten plik (lub identyczny) umieść w /etc/nginx/sites-available/vcms
# KROK 2: ln -sf /etc/nginx/sites-available/vcms /etc/nginx/sites-enabled/vcms
# KROK 3: nginx -t && systemctl reload nginx
# KROK 4: certbot --nginx -d cmd.flexgrafik.nl (wymaga DNS A → 185.243.54.115)

# ── HTTP: redirect + ACME challenge ───────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name cmd.flexgrafik.nl;

    # Let's Encrypt HTTP-01 challenge — musi być dostępne bez auth i przed redirect
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        auth_basic off;
    }

    # Przekieruj cały ruch HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTP fallback: IP bezpośrednie (bez redirect — certbot tu nie działa) ─────
server {
    listen 80;
    listen 8010;
    server_name 185.243.54.115 _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        auth_basic off;
    }

    location / {
        auth_basic "VCMS Restricted Area: Identification Required";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTPS: cmd.flexgrafik.nl (wypełni certbot — blok placeholder) ─────────────
# UWAGA: ten blok jest PLACEHOLDEREM. Certbot (`certbot --nginx -d cmd.flexgrafik.nl`)
# automatycznie doda/uzupełni ssl_certificate, ssl_certificate_key i managed comment.
# Jeśli certbot już działał — NIE nadpisuj tego bloku ręcznie.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cmd.flexgrafik.nl;

    # --- Certbot uzupełni te dwie linie automatycznie ---
    # ssl_certificate /etc/letsencrypt/live/cmd.flexgrafik.nl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cmd.flexgrafik.nl/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # Security headers (bez upgrade-insecure-requests — VCMS serwuje HTTP i HTTPS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Let's Encrypt renewal (też przez HTTPS po pierwszym deployu)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        auth_basic off;
    }

    location / {
        auth_basic "VCMS Restricted Area: Identification Required";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
